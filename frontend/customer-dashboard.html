<!DOCTYPE html>
<html lang="en">
<head>
    <script src="js/auth.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Parcel Delivery System</title>
    <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="customer-dashboard.html">🚚 Parcel Delivery System</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="customer-dashboard.html">Customer Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-danger" href="#" id="logoutBtn">Logout</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container page-shell">
        <div class="d-flex flex-wrap align-items-end justify-content-between gap-2 mb-3">
            <div>
                <h1 class="page-title mb-1">Track Your Parcel</h1>
                <div class="text-muted">Enter your parcel ID below to track its real-time location.</div>
            </div>
        </div>

        <div id="message" class="alert d-none" role="alert"></div>

        <div class="row g-3">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Track Parcel</h5>
                        <form id="trackingForm">
                            <div class="mb-3">
                                <label for="parcelIdInput" class="form-label">Enter Parcel ID</label>
                                <input type="text" class="form-control" id="parcelIdInput" placeholder="e.g., P001" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Track Parcel</button>
                        </form>
                    </div>
                </div>

                <div class="card mt-3" id="parcelInfo" style="display: none;">
                    <div class="card-body">
                        <h5 class="card-title">Parcel Information</h5>
                        <p><strong>ID:</strong> <span id="infoParcelId"></span></p>
                        <p><strong>Status:</strong> <span id="infoStatus" class="badge bg-secondary"></span></p>
                        <p><strong>Sender:</strong> <span id="infoSender"></span></p>
                        <p><strong>Receiver:</strong> <span id="infoReceiver"></span></p>
                        <p><strong>Driver:</strong> <span id="infoDriver"></span></p>
                        <p><strong>Destination:</strong> <span id="infoDestination"></span></p>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">Live Map</h5>
                        <div class="map-shell">
                            <div id="map"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="vendor/leaflet/leaflet.js"></script>
    <script src="vendor/socket.io/socket.io.min.js"></script>
    <script src="js/map.js?v=6"></script>
    <script src="js/app.js?v=6"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            initSocket();
            
            // Remove the logout button injection logic from auth.js from triggering here
            // since we added it manually. Wait, auth.js does it if no id="logoutBtn".
            
            document.getElementById('logoutBtn').addEventListener('click', (e) => {
                e.preventDefault();
                sessionStorage.removeItem('token');
                sessionStorage.removeItem('userRole');
                window.location.href = 'index.html';
            });

            document.getElementById('trackingForm').addEventListener('submit', function(e) {
                e.preventDefault();
                trackParcel();
            });
        });
    </script>
</body>
</html>
